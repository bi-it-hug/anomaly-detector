services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "8082:8082"
        volumes:
            - .:/app:cached
            - node_modules:/app/node_modules
        environment:
            CHOKIDAR_USEPOLLING: "true"
            CHOKIDAR_INTERVAL: "1000"
            WATCHPACK_POLLING: "true"
            EXPO_NO_TELEMETRY: "1"
            EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
        stdin_open: true
        tty: true
        command: npx expo start --port 8082 --host tunnel

volumes:
    node_modules:
